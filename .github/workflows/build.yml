# Manual releases: on tag vX.Y.Z or workflow_dispatch. Automated upstream releases use upstream-watch.yml.
name: Release build

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      signoz_version:
        description: "Cloudron package version (must match CloudronManifest.json version on this ref)"
        required: true
        type: string

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  REGISTRY: ghcr.io

jobs:
  image:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.ref }}

      - name: Version from tag or input
        id: ver
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "ver=${{ inputs.signoz_version }}" >> "$GITHUB_OUTPUT"
          else
            REFNAME="${{ github.ref_name }}"
            V="${REFNAME#v}"
            echo "ver=$V" >> "$GITHUB_OUTPUT"
          fi

      - name: Verify manifest matches
        run: |
          M=$(jq -r .version CloudronManifest.json)
          U=$(jq -r .upstreamVersion CloudronManifest.json)
          D=$(sed -n 's/^ARG SIGNOZ_VERSION=//p' Dockerfile | head -1)
          V="${{ steps.ver.outputs.ver }}"
          if [ "$M" != "$V" ]; then
            echo "Tag/package version $V != CloudronManifest version ($M)" >&2
            exit 1
          fi
          if [ "$D" != "$U" ]; then
            echo "Dockerfile SIGNOZ_VERSION ($D) != manifest upstreamVersion ($U)" >&2
            exit 1
          fi

      - name: Read component build args
        id: args
        run: |
          echo "signoz=$(jq -r .upstreamVersion CloudronManifest.json)" >> "$GITHUB_OUTPUT"
          echo "otelcol=$(sed -n 's/^ARG OTELCOL_VERSION=//p' Dockerfile | head -1)" >> "$GITHUB_OUTPUT"
          echo "clickhouse=$(sed -n 's/^ARG CLICKHOUSE_VERSION=//p' Dockerfile | head -1)" >> "$GITHUB_OUTPUT"
          echo "zookeeper=$(sed -n 's/^ARG ZOOKEEPER_VERSION=//p' Dockerfile | head -1)" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image reference
        id: im
        run: |
          o=$(echo "${GITHUB_REPOSITORY_OWNER}" | tr "[:upper:]" "[:lower:]")
          echo "name=${{ env.REGISTRY }}/${o}/signoz-cloudron:${{ steps.ver.outputs.ver }}" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          build-args: |
            SIGNOZ_VERSION=${{ steps.args.outputs.signoz }}
            OTELCOL_VERSION=${{ steps.args.outputs.otelcol }}
            CLICKHOUSE_VERSION=${{ steps.args.outputs.clickhouse }}
            ZOOKEEPER_VERSION=${{ steps.args.outputs.zookeeper }}
          tags: ${{ steps.im.outputs.name }}

      - name: Verify image health
        run: |
          chmod +x scripts/verify-image.sh
          scripts/verify-image.sh "${{ steps.im.outputs.name }}"

      - uses: actions/checkout@v6
        if: github.event_name == 'push'
        with:
          ref: main
          path: main

      - name: Publish catalog on main
        if: github.event_name == 'push'
        working-directory: main
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -eux
          VER="${{ steps.ver.outputs.ver }}"
          IMAGE="${{ steps.im.outputs.name }}"

          if jq -e ".versions[\"${VER}\"]" CloudronVersions.json >/dev/null; then
            echo "Version ${VER} already in CloudronVersions.json on main"
            exit 0
          fi

          npm ci
          node scripts/publish-version.mjs "${IMAGE}"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git add CloudronVersions.json
          git commit -m "chore(versions): publish v${VER} in Cloudron catalog"
          git push origin main
          echo "Published ${VER} -> ${IMAGE}"

      - name: workflow_dispatch done
        if: github.event_name == 'workflow_dispatch'
        run: |
          echo "Pushed: ${{ steps.im.outputs.name }}"
