# Weekly: if SigNoz/signoz has a new release, bump main, tag, and trigger release build.
name: Upstream release watch

on:
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: upstream-release
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: main

      - name: Sync main
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git pull --ff-only origin main

      - name: Get latest SigNoz version
        id: meta
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -eux
          JSON=$(curl -sSL -H "Authorization: Bearer ${GH_TOKEN}" -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/SigNoz/signoz/releases/latest")
          TAG=$(echo "$JSON" | jq -r .tag_name)
          U="${TAG#v}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "upstream=$U" >> "$GITHUB_OUTPUT"
          echo "relurl=$(echo "$JSON" | jq -r .html_url)" >> "$GITHUB_OUTPUT"

      - name: Resolve component versions
        id: versions
        run: |
          set -eux
          chmod +x scripts/resolve-upstream-versions.sh
          eval "$(./scripts/resolve-upstream-versions.sh "${{ steps.meta.outputs.tag }}")"
          echo "signoz=${SIGNOZ_VERSION}" >> "$GITHUB_OUTPUT"
          echo "otelcol=${OTELCOL_VERSION}" >> "$GITHUB_OUTPUT"
          echo "clickhouse=${CLICKHOUSE_VERSION}" >> "$GITHUB_OUTPUT"
          echo "zookeeper=${ZOOKEEPER_VERSION}" >> "$GITHUB_OUTPUT"

      - name: Plan release action
        id: plan
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -eux
          UP="${{ steps.meta.outputs.upstream }}"
          CUR=$(sed -n 's/^ARG SIGNOZ_VERSION=//p' Dockerfile | head -1)
          if [ -z "$CUR" ]; then
            echo "Could not read SIGNOZ_VERSION from Dockerfile" >&2
            exit 1
          fi
          CUR_M=$(jq -r .version CloudronManifest.json)
          if [ "$CUR" != "$CUR_M" ]; then
            echo "Dockerfile vs CloudronManifest.json: $CUR != $CUR_M" >&2
            exit 1
          fi

          if git ls-remote --tags origin "refs/tags/v${UP}" | grep -q .; then
            echo "action=none" >> "$GITHUB_OUTPUT"
            echo "Release tag v${UP} already exists" >&2
            exit 0
          fi

          if [ "$UP" = "$CUR" ]; then
            echo "action=tag_only" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if ! dpkg --compare-versions "$UP" "gt" "$CUR" 2>/dev/null; then
            echo "action=none" >> "$GITHUB_OUTPUT"
            echo "Not newer: upstream=$UP current=$CUR" >&2
            exit 0
          fi

          echo "action=bump" >> "$GITHUB_OUTPUT"

      - name: Apply version bump
        if: steps.plan.outputs.action == 'bump'
        run: |
          set -eux
          U="${{ steps.meta.outputs.upstream }}"
          RELURL="${{ steps.meta.outputs.relurl }}"
          sed -i "s/^ARG SIGNOZ_VERSION=.*/ARG SIGNOZ_VERSION=${U}/" Dockerfile
          sed -i "s/^ARG OTELCOL_VERSION=.*/ARG OTELCOL_VERSION=${{ steps.versions.outputs.otelcol }}/" Dockerfile
          sed -i "s/^ARG CLICKHOUSE_VERSION=.*/ARG CLICKHOUSE_VERSION=${{ steps.versions.outputs.clickhouse }}/" Dockerfile
          sed -i "s/^ARG ZOOKEEPER_VERSION=.*/ARG ZOOKEEPER_VERSION=${{ steps.versions.outputs.zookeeper }}/" Dockerfile
          tmp=$(mktemp)
          jq --arg v "$U" '.version = $v | .upstreamVersion = $v' CloudronManifest.json > "$tmp" && mv "$tmp" CloudronManifest.json
          ctmp=$(mktemp)
          {
            echo "[$U]"
            echo "* Bump [SigNoz $U]($RELURL)."
            echo
            cat CHANGELOG
          } > "$ctmp" && mv "$ctmp" CHANGELOG

      - name: Commit version bump to main
        if: steps.plan.outputs.action == 'bump'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -eux
          U="${{ steps.meta.outputs.upstream }}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git add Dockerfile CloudronManifest.json CHANGELOG
          git commit -m "chore: bump SigNoz to ${U}"
          git push origin HEAD:main

      - name: Create and push release tag
        if: steps.plan.outputs.action == 'bump' || steps.plan.outputs.action == 'tag_only'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -eux
          U="${{ steps.meta.outputs.upstream }}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git fetch origin main
          git checkout main
          git pull --ff-only origin main
          git tag -a "v${U}" -m "Release SigNoz ${U} for Cloudron"
          git push origin "v${U}"
