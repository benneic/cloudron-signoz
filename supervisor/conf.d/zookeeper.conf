[program:zookeeper]
command=/opt/bitnami/scripts/zookeeper/run.sh
autostart=true
autorestart=true
startsecs=5
priority=10
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
environment=JAVA_HOME="/opt/bitnami/java",PATH="/opt/bitnami/common/bin:/opt/bitnami/java/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin",ZOO_SERVER_ID="1",ALLOW_ANONYMOUS_LOGIN="yes",ZOO_AUTOPURGE_INTERVAL="1",ZOO_ENABLE_PROMETHEUS_METRICS="yes",ZOO_PROMETHEUS_METRICS_PORT_NUMBER="9141",ZOO_DATA_DIR="/app/data/zookeeper"
